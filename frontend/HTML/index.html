<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library Member Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2 class="logo">Library</h2>

    <nav class="nav">
      <a class="active">Discover</a>
      <a href="category.html">Category</a>
      <a href="mylibrary.html">My Library</a>
      <a href="downloads.html">Downloads</a>
      <a href="audiobooks.html">Audio Books</a>
      <a href="favourites.html">Favourites</a>
    </nav>

    <div class="sidebar-bottom">
      <a>Settings</a>
      <a>Support</a>
      <a class="logout">Logout</a>
    </div>
  </aside>

  <main class="main">

    <header class="header">
      <input type="text" placeholder="Search your favourite books" />
      <div class="user">
        <span class="bell">🔔</span>
        <img src="https://i.pravatar.cc/40" />
        <span>nisha@gmail.com</span>
      </div>
    </header>

    <!-- Books -->
    <section class="grid">
      <div class="book-card" data-title="Atomic Habits" data-author="James Clear">
        <img src="https://covers.openlibrary.org/b/isbn/9780735211292-L.jpg" />
      </div>

      <div class="book-card" data-title="Deep Work" data-author="Cal Newport">
        <img src="https://covers.openlibrary.org/b/isbn/9781455586691-L.jpg" />
      </div>

      <div class="book-card" data-title="Psychology of Money" data-author="Morgan Housel">
        <img src="https://covers.openlibrary.org/b/isbn/9780857197689-L.jpg" />
      </div>
    </section>

    <!-- Reviews -->
    <section class="section">
      <h3>Reviews</h3>
      <div id="reviews-container"></div>
    </section>

  </main>

  <!-- Details Panel -->
  <aside class="details">
    <div class="details-cover">
      <img id="book-image" src="https://covers.openlibrary.org/b/isbn/9780857197689-L.jpg" />
    </div>

    <h3 id="book-title">Book Title</h3>
    <p class="author" id="book-author">Author Name</p>

   <button class="btn" id="read-btn">Read Now</button>
<button class="btn" id="fav-btn">❤️ Add to Favorites</button>
  </aside>

</div>

<script src="script.js"></script>

</body>
</html>
