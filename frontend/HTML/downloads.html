<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library Member Portal – Downloads</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2 class="logo">Library</h2>

    <nav class="nav">
      <a href="index.html">Discover</a>
      <a href="category.html">Category</a>
      <a href="mylibrary.html">My Library</a>
      <a class="active" href="downloads.html">Downloads</a>
      <a href="audiobooks.html">Audio Books</a>
      <a href="favourites.html">Favourites</a>
    </nav>

    <div class="sidebar-bottom">
      <a>Settings</a>
      <a>Support</a>
      <a class="logout">Logout</a>
    </div>
  </aside>

  <main class="main">

    <section class="page-header">
      <div>
        <h1>Downloads</h1>
        <p>Access your downloaded books offline</p>
      </div>
    </section>

    <section class="download-list">

      <div class="download-card">
        <img src="https://covers.openlibrary.org/b/isbn/9780735211292-L.jpg" />
        <div class="download-info">
          <h4>Atomic Habits</h4>
          <p>James Clear</p>
          <span class="file-info">PDF • 2.3 MB</span>
        </div>
        <button class="download-btn">Open</button>
      </div>

      <div class="download-card">
        <img src="https://covers.openlibrary.org/b/isbn/9781455586691-L.jpg" />
        <div class="download-info">
          <h4>Deep Work</h4>
          <p>Cal Newport</p>
          <span class="file-info">EPUB • 1.8 MB</span>
        </div>
        <button class="download-btn">Open</button>
      </div>

      <div class="download-card">
        <img src="https://covers.openlibrary.org/b/isbn/9780857197689-L.jpg" />
        <div class="download-info">
          <h4>Psychology of Money</h4>
          <p>Morgan Housel</p>
          <span class="file-info">PDF • 3.1 MB</span>
        </div>
        <button class="download-btn">Open</button>
      </div>
<link rel="stylesheet" href="/CSS/style.css">
<script src="/JS/script.js"></script>
    </section>

  </main>

</div>
